<!DOCTYPE html>
<html>
<head>
    <title>Candidate Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
    url('{{ url_for('static', filename='candidates_images/srmist_bg.jpg') }}');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    ">
<div class="container py-5">
    <div class="glass-card p-4 mx-auto" style="
    max-width:700px;
    width:100%;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    ">
        <h2 class="text-center mb-4"> Please fill all the Credentials Correctly </h2>

        <form method="POST" enctype="multipart/form-data">
            <input class="form-control mb-3" name="full_name" placeholder="Full Name" required>
            <input class="form-control mb-3" name="reg_no" placeholder="Registration Number" required>
            <input class="form-control mb-3" name="email" placeholder="Official College Email" required>
            <input class="form-control mb-3" name="course" placeholder="Course" required>
            <input class="form-control mb-3" name="branch" placeholder="Branch" required>
            <input class="form-control mb-3" name="specialization" placeholder="Specialization" required>
            <input class="form-control mb-3" name="position" placeholder="Position Applying For" required>
            <input class="form-control mb-3" type="file" name="photo" required>

            <button class="btn btn-success w-100"> Submit Request</button>
        </form>
    </div>
</div>
</body>
</html>
