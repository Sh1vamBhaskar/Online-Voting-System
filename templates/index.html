<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Voting Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style=" min-height:100vh;
                background:
                linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                url('{{ url_for('static', filename='candidates_images/srmist_bg.jpg') }}');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                ">

    <!--  PREMIUM NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center"
   href="https://www.srmup.in/"
   target="_blank"
   style="font-size: 2rem;">

    <img src="{{ url_for('static', filename='candidates_images/logo.svg') }}"
         alt="College Logo"
         style="height: 50px;   width: auto; margin-right: 16px;">

    SRM Institute Of Science And Technology, Ghaziabad
</a>

            <div class="ms-auto">
                <a href="/admin_login" class="btn btn-outline-light">🔐 Admin Login</a>
            </div>
        </div>
    </nav>

    <!--  HERO SECTION -->
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="glass-card text-center p-5">
            <h1 class="display-5 fw-bold"> Welcome to the Election Portal !</h1>
            <p class="lead mt-3"> Secure, fast, and transparent student council voting</p>

                <div class="d-flex justify-content-center gap-3 mt-3">
                        <a href="/login" class="btn btn-light btn-lg px-4">
                                    👨‍🎓 Login To Vote !
                         </a>

                            <a href="/candidate_register" class="btn btn-success btn-lg px-4">
                                 Register as Candidate
                            </a>
                </div>

            <p id="countdown" class="mt-4 fw-bold"></p>
        </div>
    </div>

    <!-- ⏳ COUNTDOWN -->
    <script>
    const end = new Date('2026-12-31T23:59:59').getTime();
    setInterval(() => {
      const now = new Date().getTime();
      const diff = end - now;
      const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
      const m = Math.floor((diff % (1000*60*60)) / (1000*60));
      const s = Math.floor((diff % (1000*60)) / 1000);
      document.getElementById('countdown').innerText =
          `⏳ Voting closes in ${h}h ${m}m ${s}s`;
    }, 1000);
    </script>
    <footer class="text-center text-white py-3">
    © 2026 SRMIST , Delhi-NCR , Ghaziabad • Designed by Shivam Bhaskar
    </footer>

</body>
</html>
