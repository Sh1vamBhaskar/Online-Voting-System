<!DOCTYPE html>
<html>
<head>
    <title>Portal Message</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            overflow: hidden;
        }
                .message-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 420px;
            animation: swing 2.2s ease-in-out 1;
        }

        @keyframes swing {
            0%   { transform: translateX(0); }
            10%  { transform: translateX(-18px) rotate(-2deg); }
            20%  { transform: translateX(18px) rotate(2deg); }
            30%  { transform: translateX(-14px) rotate(-1.5deg); }
            40%  { transform: translateX(14px) rotate(1.5deg); }
            50%  { transform: translateX(-10px) rotate(-1deg); }
            60%  { transform: translateX(10px) rotate(1deg); }
            70%  { transform: translateX(-6px) rotate(-0.5deg); }
            80%  { transform: translateX(6px) rotate(0.5deg); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="message-card">
        <h2 class="fw-bold mb-3">{{ title }}</h2>
        <p class="lead">{{ message }}</p>
        <a href="{{ back_url }}" class="btn btn-dark mt-3 px-4">⬅ Go Back</a>
    </div>
</body>
</html>
