<!DOCTYPE html>
<html>
<head>
    <title>Voting Audit Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style=" min-height:100vh;
                    background:
                    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                    url('{{ url_for('static', filename='candidates_images/srmist_bg.jpg') }}');
                    background-size: cover;
                    background-position: center;
                    background-repeat: no-repeat;
                    ">
<div class="container py-5">
    <h2 class="text-center fw-bold mb-4">📧 Voting Audit Logs</h2>

    {% for log in logs %}
    <div class="card shadow p-3 mb-3">
        <strong>{{ log[0] }}</strong>
        <span>⏰ {{ log[1] }}</span>
    </div>
    {% endfor %}

    <div class="text-center mt-4">
        <a href="/admin" class="btn btn-secondary">⬅️ Back to Dashboard</a>
    </div>
</div>
</body>
</html>
