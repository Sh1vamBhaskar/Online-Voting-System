
<!DOCTYPE html>
<html>
<head>
    <title>Admin Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="light-bg">
<div class="container py-5">
    <h2 class="fw-bold text-center mb-4">📈 Election Analytics Dashboard</h2>
    <form action="/add_candidate" method="POST" class="row g-3 mb-5">
        <div class="col-md-5">
            <input class="form-control" name="name" placeholder="Candidate Name" required>
        </div>
        <div class="col-md-5">
            <input class="form-control" name="image" placeholder="Image filename (e.g. aman.jpg)" required>
        </div>
        <div class="col-md-2">
            <button class="btn btn-success w-100">➕ Add</button>
        </div>
    </form>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card shadow p-3 text-center">
                <h5>Total Candidates</h5>
                <h2>{{ results|length }}</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow p-3 text-center">
                <h5>Total Votes</h5>
                <h2>{{ results | sum(attribute=1) }}</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow p-3 text-center">
                <h5>Leading Candidate</h5>
                <h2>{{ results[0][0] }}</h2>
            </div>
        </div>
        </div>

    <div class="card shadow p-4">
        <canvas id="voteChart"></canvas>
    </div>
    <div class="card shadow p-4 mt-4">
    <h4 class="mb-3">🗂️ Manage Candidates</h4>

    {% for result in results %}
    <div class="d-flex justify-content-between align-items-center border-bottom py-2">
        <div>
            <strong>{{ result[0] }}</strong>
            <span class="text-muted ms-2">({{ result[1] }} votes)</span>
        </div>

        <a href="/delete_candidate/{{ loop.index }}"
           class="btn btn-danger btn-sm">
           🗑️ Delete
        </a>
    </div>
    {% endfor %}
</div>
</div>

<script>
        const labels = [{% for result in results %}'{{ result[0] }}',{% endfor %}];
        const data = [{% for result in results %}{{ result[1] }},{% endfor %}];

new Chart(document.getElementById('voteChart'), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Votes',
            data: data,
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: { beginAtZero: true }
        }
    }
});
</script>
</body>
</html>
