<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="min-height:100vh;
            background:
            linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
            url('{{ url_for('static', filename='candidates_images/srmist_bg.jpg') }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            ">
<div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="glass-card p-4 login-box">
        <h2 class="text-center mb-4">🎓 Student Login</h2>
        <form method="POST">
            <input type="text" name="roll_no" class="form-control mb-3" placeholder="Roll Number" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
            <input type="email" name="email" class="form-control mb-3" placeholder="College Email" required>
            <button class="btn btn-dark w-100">Login</button>
            <div class="text-center mt-3">
                    <a href="/admin_login" class="btn btn-dark w-100">  Admin Login</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
