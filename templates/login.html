<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="min-height:100vh;
            background:
            linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
            url('{{ url_for('static', filename='candidates_images/srmist_bg.jpg') }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            ">
<div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="glass-card p-4 mx-auto" style="
            max-width:700px;
            width:100%;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            ">
        <h2 class="text-center mb-4">🎓 Student Login</h2>
                
        <form method="POST">
            <input type="text" name="roll_no" class="form-control mb-3" placeholder="Roll Number" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
            <input type="email" name="email" class="form-control mb-3" placeholder="College Email" required>
            <button class="btn btn-success w-100">Login</button>
            
        </form>
    </div>
</div>
</body>
</html>
